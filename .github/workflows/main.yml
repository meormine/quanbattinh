name: RSS Asubha

on:
  schedule:
    # Every 6 hours
    - cron: '5 */6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run generation script
        run: node generate-rss-asubha.js

      - name: Commit & Push changes (only if files changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Asubha RSS and quote history"
          file_pattern: asubha.xml history-asubha.json cycle-state-asubha.json cycle-image-asubha.json
          commit_user_name: GitHub Action
          commit_user_email: action@github.com

